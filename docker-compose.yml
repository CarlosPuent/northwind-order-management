version: "3.8"

services:
  # ---- SQL Server ----
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Northwind@2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Northwind@2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Backend API ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5281:5281"
    environment:
      ConnectionStrings__Northwind: "Server=db;Database=Northwind;User Id=sa;Password=Northwind@2026!;TrustServerCertificate=True;Encrypt=True;"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - api

volumes:
  sqlserver-data: