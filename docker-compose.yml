services:
  # ---- SQL Server with Northwind pre-loaded ----
  db:
    build:
      context: ./docker/sql
      dockerfile: Dockerfile
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Northwind@2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Northwind@2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # ---- Backend API ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5281:5281"
    environment:
      ConnectionStrings__Northwind: "Server=db;Database=Northwind;User Id=sa;Password=Northwind@2026!;TrustServerCertificate=True;Encrypt=True;"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - api

volumes:
  sqlserver-data: